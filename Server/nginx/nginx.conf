events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend API and WebSocket configuration
    upstream backend_api {
        server api:3000;
    }

    # 1. REDIRECCIÓN AUTOMÁTICA A HTTPS
    server {
        listen 80;
        server_name ticktack-tag.dam.inspedralbes.cat;
        return 301 https://$host$request_uri;
    }

    # 2. SERVIDOR SEGURO (HTTPS)
    server {
        listen 443 ssl;
        server_name ticktack-tag.dam.inspedralbes.cat;

        # RUTAS DE LOS CERTIFICADOS (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/ticktack-tag.dam.inspedralbes.cat/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ticktack-tag.dam.inspedralbes.cat/privkey.pem;

        # Optimización SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Tamaño máximo de subida
        client_max_body_size 20M;

        # API Proxies
        location /api/ {
            proxy_pass http://backend_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache off;
        }

        # Health Check
        location /health {
            proxy_pass http://backend_api/health;
        }

        # FRONTEND + WEBSOCKET (Unificados)
        location / {
            # 1. Si es WebSocket (Unity), usar el bloque especial interno
            error_page 418 = @websocket;
            if ($http_upgrade = "websocket") {
                return 418;
            }

            # 2. Si es tráfico web normal (Navegador), servir archivos
            root /var/www/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            gzip_static on;

            # Security headers for SharedArrayBuffer (Unity 2021+)
            add_header Cross-Origin-Embedder-Policy require-corp;
            add_header Cross-Origin-Opener-Policy same-origin;
        }

        # Unity WebGL: Compressed file configuration
        location ~ .+\.(data|symbols\.json)\.unityweb$ {
            add_header Content-Encoding gzip;
            default_type application/octet-stream;
        }
        location ~ .+\.js\.unityweb$ {
            add_header Content-Encoding gzip;
            default_type application/javascript;
        }
        location ~ .+\.wasm\.unityweb$ {
            add_header Content-Encoding gzip;
            default_type application/wasm;
        }

        # Bloque interno para el WebSocket de Unity
        location @websocket {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}