events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend API and WebSocket configuration
    upstream backend_api {
        server api:3000;
    }

    server {
        listen 80;
        server_name ticktack-tag.dam.inspedralbes.cat;

        # WebGL Frontend (Static Files)
        location / {
            root /var/www/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Gzip support for Unity builds
            gzip_static on;
        }

        # API Proxies
        location /api/ {
            proxy_pass http://backend_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_off;
        }

        # Health Check
        location /health {
            proxy_pass http://backend_api/health;
        }

        # WebSocket Proxy (Direct connection for Unity client)
        location = / {
            # Check if it's a WebSocket upgrade request
            if ($http_upgrade = "websocket") {
                proxy_pass http://backend_api;
            }
            # Otherwise serve static frontend (handled by 'location /' above)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Increase upload size for skins/maps
        client_max_body_size 20M;
    }
}
